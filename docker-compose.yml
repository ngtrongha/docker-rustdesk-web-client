services:
  rustdesk-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        RUSTDESK_REF: 0b24f1ba9f69b0022d09464c6d24f1c45271f294
        FLUTTER_VERSION: 3.22.1
        FLUTTER_REF: a14f74ff3a1cbd521163c5f03d68113d50af93d3
        RUST_VERSION: 1.75.0
        YARN_VERSION: 3.2.0
        WEB_DEPS_SHA256: b66011c4fc066b90c46ba0c78884fe5d1a7e5a7fad3dce401300ad893de63818
    image: local-rustdesk-web-client:dev
    container_name: rustdesk-web-client-dev
    ports:
      - "127.0.0.1:5000:80"
    environment:
      PUBLIC_HOST: remote-connect.bvkhanhhoa.cloud
      API_SERVER: https://remote-connect.bvkhanhhoa.cloud
      RUSTDESK_PUBLIC_KEY: ${RUSTDESK_PUBLIC_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
